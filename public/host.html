<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Host — Kohaat</title>
<link rel="stylesheet" href="/styles.css" />
<style>
  .host-wrap { min-height: 100vh; display:flex; flex-direction:column; padding: 24px 32px; gap: 16px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; color:white; }
  .topbar h2 { margin:0; font-size:1.4rem; font-weight:700; }
  .stage { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 24px; }
  .lobby-grid { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; max-width: 900px; }
  .join-info { display:flex; gap:36px; align-items:center; flex-wrap:wrap; justify-content:center; }
  .join-info .url { color: var(--blue-4); font-size: 1.3rem; word-break: break-all; max-width: 380px; }
  .qr-box {
    background: white;
    padding: 14px;
    border-radius: 16px;
    box-shadow: var(--shadow);
  }
  .qr-box svg { width: 220px; height: 220px; display: block; }
  .qr-caption { color: var(--blue-4); text-align: center; margin-top: 8px; font-size: 0.9rem; }
  .public-url-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    width: 100%;
    max-width: 700px;
    align-items: center;
  }
  .public-url-row input {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    border-radius: 10px;
    padding: 8px 12px;
    flex: 1;
    font-family: inherit;
  }
  .public-url-row input::placeholder { color: rgba(255,255,255,0.45); }
  .public-url-row label { color: var(--blue-4); font-size: 0.9rem; white-space: nowrap; }
  .sound-toggle {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .controls { display:flex; gap:12px; justify-content:center; padding: 16px; flex-wrap: wrap; }
  .question-header { color:white; font-size: 1.1rem; opacity: 0.8; text-align:center; }

  .leaderboard { width: 100%; max-width: 700px; display:flex; flex-direction:column; gap:10px; }
  .lb-row {
    display:flex; align-items:center; justify-content:space-between;
    background: rgba(255,255,255,0.08); color:white;
    padding: 14px 20px; border-radius: 12px; font-size:1.2rem;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .lb-row .rank { width: 40px; font-weight:800; color: var(--mango-4); }
  .lb-row.first { background: linear-gradient(90deg, rgba(255,201,51,0.25), rgba(255,201,51,0.05)); border-color: var(--mango-4); }
  #quizPicker { max-width: 540px; }

  /* live tally bars overlaid on the question screen for polls */
  .live-tally { width: 100%; margin-top: 18px; }
  .live-tally .bar-row { margin: 12px 0; }

  /* reveal-screen styling: highlight correct tiles, dim wrong ones */
  .reveal-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
  .reveal-tile {
    position: relative;
    min-height: 110px;
    border-radius: var(--radius);
    padding: 18px;
    color: white;
    font-weight: 700;
    font-size: 1.1rem;
    text-align: left;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
  }
  /* When this tile is the correct one, give the text room so the CORRECT badge
     can sit above it instead of overlapping. */
  .reveal-tile.correct { padding-top: 44px; }
  .reveal-tile.a { background: var(--tile-a); }
  .reveal-tile.b { background: var(--tile-b); }
  .reveal-tile.c { background: var(--tile-c); }
  .reveal-tile.d { background: var(--tile-d); }
  .reveal-tile.dim { opacity: 0.35; filter: grayscale(0.4); }
  .reveal-tile.correct {
    outline: 5px solid #FFC933; /* mango-4 highlight */
    transform: scale(1.03);
    box-shadow: 0 0 0 8px rgba(255, 201, 51, 0.25), var(--shadow);
    animation: correctPulse 1.2s ease infinite;
  }
  @keyframes correctPulse {
    0%, 100% { box-shadow: 0 0 0 8px rgba(255, 201, 51, 0.25), var(--shadow); }
    50%      { box-shadow: 0 0 0 14px rgba(255, 201, 51, 0.15), var(--shadow); }
  }
  .reveal-tile .top { display: flex; align-items: center; gap: 12px; }
  .reveal-tile .shape {
    width: 28px; height: 28px; background: rgba(255,255,255,0.9); flex: 0 0 28px;
  }
  .reveal-tile.a .shape { clip-path: polygon(50% 0, 100% 100%, 0 100%); }
  .reveal-tile.b .shape { border-radius: 50%; }
  .reveal-tile.c .shape { clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); }
  .reveal-tile.d .shape { border-radius: 6px; }
  .reveal-tile .stat {
    margin-top: 12px;
    display: flex; align-items: baseline; gap: 12px;
    font-weight: 800;
  }
  .reveal-tile .pct { font-size: 1.8rem; }
  .reveal-tile .num { opacity: 0.85; font-size: 0.95rem; font-weight: 600; }
  .reveal-tile .correct-badge {
    position: absolute; top: 10px; left: 14px;
    background: #FFC933; color: var(--mango-7);
    padding: 4px 12px; border-radius: 999px; font-size: 0.8rem; font-weight: 800;
    letter-spacing: 0.04em;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }
</style>
</head>
<body>
<div class="host-wrap">
  <div class="topbar">
    <h2 id="quizTitle">Kohaat — Host</h2>
    <div class="row">
      <button id="musicToggle" class="sound-toggle" title="Lobby music">🎵 Music: on</button>
      <button id="sfxToggle" class="sound-toggle" title="Sound effects">🔊 SFX: on</button>
      <a href="/admin.html" class="sound-toggle" style="text-decoration:none;">⚙ Admin</a>
      <span class="players-pill" id="playerCount">0 players</span>
      <span class="timer-pill hidden" id="hostTimer">—</span>
    </div>
  </div>

  <div class="stage">
    <!-- Pick quiz -->
    <div id="screen-pick" class="col card" id="quizPicker">
      <h2 style="margin:0 0 8px;">Choose a quiz</h2>
      <select id="quizSelect"></select>
      <button id="createBtn" class="btn-primary">Create game</button>
    </div>

    <!-- Lobby -->
    <div id="screen-lobby" class="col hidden" style="align-items:center; width:100%;">
      <div class="brand">
        <h1 id="lobbyTitle">Are You Smarter Than a Chatbot?</h1>
        <p>Players, join now</p>
      </div>
      <div class="join-info">
        <div>
          <div class="muted" style="color:var(--blue-4)">Go to</div>
          <div class="url" id="joinUrl">http://…</div>
          <div class="muted" style="color:var(--blue-4); margin-top: 18px;">Game PIN</div>
          <div class="pin-display" id="pinDisplay">— — — — — —</div>
        </div>
        <div>
          <div class="qr-box"><div id="qrBox"></div></div>
          <div class="qr-caption">Scan to join</div>
        </div>
      </div>
      <div class="public-url-row">
        <label>Public URL for remote players:</label>
        <input id="publicUrlInput" type="text" placeholder="https://your-tunnel.ngrok.io  (paste here for virtual meetings)" />
        <button id="useLocalBtn" class="sound-toggle">Use LAN</button>
      </div>
      <div id="playersList" class="lobby-grid"></div>
    </div>

    <!-- Question -->
    <div id="screen-question" class="col hidden" style="align-items:center; width:100%; max-width: 1000px;">
      <div class="question-header" id="qHeader">Question 1 of 13</div>
      <div class="huge-question" id="qText">…</div>
      <div id="qTiles" class="tile-grid"></div>
      <div id="qWordcloud" class="wordcloud-canvas hidden" style="width:100%; height:400px;"></div>
      <!-- Real-time tally bars (shown for polls during the question) -->
      <div id="liveTally" class="live-tally hidden"></div>
      <div class="row" style="margin-top:14px;">
        <span class="players-pill" id="answeredCount">0 / 0 answered</span>
      </div>
    </div>

    <!-- Reveal -->
    <div id="screen-reveal" class="col hidden" style="align-items:center; width:100%; max-width: 1000px;">
      <div class="question-header" id="revealHeader">Results</div>
      <div class="huge-question" id="revealText"></div>
      <div id="revealBody" style="width:100%;"></div>
    </div>

    <!-- Leaderboard -->
    <div id="screen-leaderboard" class="col hidden" style="align-items:center; width:100%;">
      <div class="brand"><h1>Leaderboard</h1></div>
      <div id="lbList" class="leaderboard"></div>
    </div>

    <!-- Podium -->
    <div id="screen-podium" class="col hidden" style="align-items:center; width:100%;">
      <div class="brand"><h1>🏆 Final Podium</h1><p>First prize: bragging rights.</p></div>
      <div class="podium" id="podiumEl"></div>
      <div id="lbFull" class="leaderboard" style="margin-top:30px;"></div>
    </div>
  </div>

  <div class="controls">
    <button id="backBtn" class="btn-ghost hidden">◀ Back</button>
    <button id="nextBtn" class="btn-primary hidden">Next ▶</button>
    <button id="skipBtn" class="btn-ghost hidden">Skip timer</button>
    <button id="leaderboardBtn" class="btn-secondary hidden">Show leaderboard</button>
    <button id="newSessionBtn" class="btn-secondary hidden">New session</button>
    <button id="endBtn" class="btn-danger hidden">End game</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/sounds.js"></script>
<script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const show = (which) => {
  for (const s of ['pick','lobby','question','reveal','leaderboard','podium']) {
    $('screen-' + s).classList.toggle('hidden', s !== which);
  }
};

const socket = io();
let currentPin = null;
let currentQuestion = null;
let timerInterval = null;
let lastReveal = null;
let publicBase = '';
let quizList = [];

// ----- sound controls -----
function updateSoundLabels() {
  $('musicToggle').textContent = '🎵 Music: ' + (Sound.isMusicOn() ? 'on' : 'off');
  $('sfxToggle').textContent  = '🔊 SFX: '   + (Sound.isSfxOn()   ? 'on' : 'off');
}
$('musicToggle').addEventListener('click', () => {
  Sound.resume();
  Sound.setMusic(!Sound.isMusicOn());
  if (Sound.isMusicOn() && !$('screen-lobby').classList.contains('hidden')) Sound.startMusic();
  updateSoundLabels();
});
$('sfxToggle').addEventListener('click', () => {
  Sound.resume();
  Sound.setSfx(!Sound.isSfxOn());
  updateSoundLabels();
});

// ----- join URL + QR -----
function joinBase() {
  return (publicBase || `${location.protocol}//${location.host}`).replace(/\/$/, '');
}
function updateJoinUI() {
  if (!currentPin) return;
  const url = `${joinBase()}/?pin=${currentPin}`;
  $('joinUrl').textContent = url;
  const qrSrc = `/qr?url=${encodeURIComponent(url)}`;
  $('qrBox').innerHTML = `<img src="${qrSrc}" alt="QR" style="width:220px;height:220px;display:block;" />`;
}
$('publicUrlInput').addEventListener('change', () => {
  const v = $('publicUrlInput').value.trim();
  publicBase = v;
  try { localStorage.setItem('publicBase', v); } catch {}
  updateJoinUI();
});
$('useLocalBtn').addEventListener('click', () => {
  publicBase = '';
  $('publicUrlInput').value = '';
  try { localStorage.removeItem('publicBase'); } catch {}
  updateJoinUI();
});
try {
  const saved = localStorage.getItem('publicBase');
  if (saved) { publicBase = saved; $('publicUrlInput').value = saved; }
} catch {}
updateSoundLabels();

async function loadQuizzes() {
  const res = await fetch('/api/quizzes');
  quizList = await res.json();
  const sel = $('quizSelect');
  sel.innerHTML = '';
  quizList.forEach(q => {
    const opt = document.createElement('option');
    opt.value = q.id;
    opt.textContent = `${q.title} (${q.questions.length} questions)`;
    sel.appendChild(opt);
  });
}
loadQuizzes();

$('createBtn').addEventListener('click', () => {
  Sound.resume();
  const quizId = $('quizSelect').value;
  socket.emit('host:create', { quizId }, (res) => {
    if (res.error) return alert(res.error);
    enterLobby(res);
    Sound.startMusic();
  });
});

function enterLobby(res) {
  currentPin = res.pin;
  $('pinDisplay').textContent = res.pin;
  $('lobbyTitle').textContent = res.quiz.title;
  $('quizTitle').textContent = res.quiz.title;
  $('playersList').innerHTML = '';
  updateJoinUI();
  $('nextBtn').classList.remove('hidden');
  $('endBtn').classList.remove('hidden');
  $('newSessionBtn').classList.add('hidden');
  $('nextBtn').textContent = 'Start ▶';
  show('lobby');
}

$('nextBtn').addEventListener('click', () => socket.emit('host:next'));
$('skipBtn').addEventListener('click', () => socket.emit('host:skip'));
$('leaderboardBtn').addEventListener('click', () => socket.emit('host:showLeaderboard'));
$('backBtn').addEventListener('click', () => {
  if (confirm('Go back to the previous question? Players will replay it and any points from the last question will be undone.')) {
    socket.emit('host:back');
  }
});
$('endBtn').addEventListener('click', () => {
  if (confirm('End the game for everyone?')) socket.emit('host:end');
});

// "New session" — opens a quiz picker overlay so the host can pick the same or a different quiz.
$('newSessionBtn').addEventListener('click', () => {
  const titles = quizList.map((q, i) => `${i + 1}. ${q.title} (${q.questions.length}q)`).join('\n');
  const def = quizList.findIndex(q => q.title === $('quizTitle').textContent);
  const pick = prompt(
    `Start a new session with which quiz? Enter the number:\n\n${titles}`,
    String((def >= 0 ? def : 0) + 1)
  );
  if (!pick) return;
  const idx = parseInt(pick, 10) - 1;
  if (isNaN(idx) || idx < 0 || idx >= quizList.length) return alert('Invalid pick.');
  socket.emit('host:newSession', { quizId: quizList[idx].id }, (res) => {
    if (res.error) return alert(res.error);
    enterLobby(res);
    Sound.startMusic();
  });
});

socket.on('state', (s) => {
  $('playerCount').textContent = `${s.players.length} player${s.players.length === 1 ? '' : 's'}`;
  // Show "Back" whenever there's a prior question to return to.
  const canGoBack =
    (s.state === 'question'    && s.currentIndex >= 1) ||
    (s.state === 'reveal'      && s.currentIndex >= 1) ||
    (s.state === 'leaderboard' && s.currentIndex >= 1);
  $('backBtn').classList.toggle('hidden', !canGoBack);
});

socket.on('player:joined', ({ name, count }) => {
  $('playerCount').textContent = `${count} player${count === 1 ? '' : 's'}`;
  const chip = document.createElement('div');
  chip.className = 'player-chip';
  chip.textContent = name;
  $('playersList').appendChild(chip);
  Sound.play('join');
});
socket.on('player:left', ({ name, count }) => {
  $('playerCount').textContent = `${count} player${count === 1 ? '' : 's'}`;
  [...$('playersList').children].forEach(c => { if (c.textContent === name) c.remove(); });
});

socket.on('question:start', ({ question, index, total }) => {
  Sound.stopMusic();
  Sound.play('questionStart');
  currentQuestion = question;
  $('qHeader').textContent = `Question ${index + 1} of ${total} — ${prettyType(question.type)}`;
  $('qText').textContent = question.text;
  $('qTiles').classList.add('hidden');
  $('qTiles').innerHTML = '';
  $('qWordcloud').classList.add('hidden');
  $('qWordcloud').innerHTML = '';
  $('liveTally').classList.add('hidden');
  $('liveTally').innerHTML = '';

  if (question.type === 'wordcloud') {
    $('qWordcloud').classList.remove('hidden');
    // Reset color map so this cloud gets a fresh palette
    Object.keys(wcColorMap).forEach(k => delete wcColorMap[k]);
    wcColorIdx = 0;
    // Start with an empty white canvas and a placeholder
    $('qWordcloud').className = 'wordcloud-canvas';
    const ph = document.createElement('span');
    ph.className = 'wc-placeholder';
    ph.textContent = 'Players are typing on their devices…';
    $('qWordcloud').appendChild(ph);
  } else {
    $('qTiles').classList.remove('hidden');
    const letters = ['a','b','c','d'];
    question.options.forEach((o, i) => {
      const t = document.createElement('div');
      t.className = `tile ${letters[i]}`;
      t.innerHTML = `<span class="shape"></span><span>${escape(o.text)}</span>`;
      $('qTiles').appendChild(t);
    });
    // For polls, show LIVE tally bars under the tiles right away.
    if (question.type === 'poll') {
      $('liveTally').classList.remove('hidden');
      renderLiveTally(question.options.map(o => o.text), {}, 0);
    }
  }
  $('answeredCount').textContent = `0 / ${$('playerCount').textContent.split(' ')[0]} answered`;
  startTimer(question.time);

  $('hostTimer').classList.remove('hidden');
  $('nextBtn').classList.add('hidden');
  $('skipBtn').classList.remove('hidden');
  $('leaderboardBtn').classList.add('hidden');
  show('question');
});

socket.on('answers:count', ({ answered, total }) => {
  $('answeredCount').textContent = `${answered} / ${total} answered`;
});

// ----- Live tallies during the question -----
socket.on('live:tally', ({ type, tally, totalPlayers, answered }) => {
  if (!currentQuestion) return;
  if (currentQuestion.type !== type) return;
  // Show live tally only for polls (per request).
  if (type === 'poll') {
    $('liveTally').classList.remove('hidden');
    renderLiveTally(currentQuestion.options.map(o => o.text), tally, answered || 0);
  }
});

socket.on('live:wordcloud', ({ words, totalPlayers, donePlayers }) => {
  if (!currentQuestion || currentQuestion.type !== 'wordcloud') return;
  const el = $('qWordcloud');
  el.className = 'wordcloud-canvas';
  renderWordCloud(el, words);
});

function renderLiveTally(optionTexts, tally, answered) {
  const el = $('liveTally');
  el.innerHTML = '';
  const total = Object.values(tally).reduce((a,b) => a+b, 0);
  optionTexts.forEach((text, i) => {
    const count = tally[i] || 0;
    const pct = total > 0 ? (count / total) * 100 : 0;
    const color = ['var(--tile-a)','var(--tile-b)','var(--tile-c)','var(--tile-d)'][i];
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="label">${escape(text)}</div>
      <div class="bar"><div style="width:${pct}%; background:${color};"></div></div>
      <div class="count">${Math.round(pct)}%</div>
    `;
    el.appendChild(row);
  });
}

socket.on('question:reveal', (r) => {
  lastReveal = r;
  clearInterval(timerInterval);
  Sound.play('reveal');
  $('hostTimer').classList.add('hidden');
  $('skipBtn').classList.add('hidden');
  $('nextBtn').classList.remove('hidden');
  $('nextBtn').textContent = 'Next ▶';
  $('leaderboardBtn').classList.toggle('hidden', !r.isScored);

  $('revealHeader').textContent = `${r.totalAnswers} / ${r.totalPlayers} answered`;
  $('revealText').textContent = r.text;

  const body = $('revealBody');
  body.innerHTML = '';

  if (r.type === 'wordcloud') {
    const cloud = document.createElement('div');
    cloud.className = 'wordcloud-canvas';
    cloud.style.height = '420px';
    renderWordCloud(cloud, r.words);
    body.appendChild(cloud);
  } else {
    // Tile-style reveal with correct-answer HIGHLIGHTING (not a tick).
    // Polls show percentages; quiz/TF show count + percentage.
    const letters = ['a','b','c','d'];
    const total = Object.values(r.tally).reduce((a,b) => a+b, 0) || 1;
    const grid = document.createElement('div');
    grid.className = 'reveal-tiles';
    r.options.forEach((text, i) => {
      const isCorrect = r.correctIndex === i;
      const hasCorrect = r.correctIndex !== null && r.correctIndex !== undefined;
      const tile = document.createElement('div');
      const dim = hasCorrect && !isCorrect ? ' dim' : '';
      const correct = isCorrect ? ' correct' : '';
      tile.className = `reveal-tile ${letters[i]}${dim}${correct}`;
      const count = r.tally[i] || 0;
      const pct = total > 0 ? Math.round((count / total) * 100) : 0;
      const statHtml = r.isScored
        ? `<div class="stat"><div class="pct">${pct}%</div><div class="num">(${count} ${count === 1 ? 'vote' : 'votes'})</div></div>`
        : `<div class="stat"><div class="pct">${pct}%</div></div>`;
      tile.innerHTML = `
        ${isCorrect ? '<div class="correct-badge">CORRECT</div>' : ''}
        <div class="top"><span class="shape"></span><span>${escape(text)}</span></div>
        ${statHtml}
      `;
      grid.appendChild(tile);
    });
    body.appendChild(grid);
  }
  show('reveal');
});

socket.on('leaderboard', ({ players }) => {
  const list = $('lbList');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row' + (i === 0 ? ' first' : '');
    row.innerHTML = `<span class="rank">${i + 1}</span><span class="grow">${escape(p.name)}</span><span><strong>${p.score}</strong></span>`;
    list.appendChild(row);
  });
  show('leaderboard');
  $('nextBtn').classList.remove('hidden');
  $('nextBtn').textContent = 'Next question ▶';
});

socket.on('game:finished', ({ podium }) => {
  Sound.stopMusic();
  Sound.play('podium');
  $('hostTimer').classList.add('hidden');
  $('nextBtn').classList.add('hidden');
  $('skipBtn').classList.add('hidden');
  $('leaderboardBtn').classList.add('hidden');
  $('backBtn').classList.add('hidden');
  $('newSessionBtn').classList.remove('hidden');

  const el = $('podiumEl');
  el.innerHTML = '';
  const order = [1, 0, 2]; // 2nd, 1st, 3rd visually
  order.forEach(i => {
    if (!podium[i]) { el.appendChild(document.createElement('div')); return; }
    const block = document.createElement('div');
    block.className = `podium-block podium-${i + 1}`;
    block.innerHTML = `<div class="place">#${i + 1}</div><div class="name">${escape(podium[i].name)}</div><div class="score">${podium[i].score} pts</div>`;
    el.appendChild(block);
  });

  const full = $('lbFull');
  full.innerHTML = '';
  podium.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row' + (i === 0 ? ' first' : '');
    row.innerHTML = `<span class="rank">${i + 1}</span><span class="grow">${escape(p.name)}</span><span><strong>${p.score}</strong></span>`;
    full.appendChild(row);
  });

  show('podium');
});

function startTimer(seconds) {
  let remaining = seconds;
  $('hostTimer').textContent = remaining + 's';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    remaining--;
    $('hostTimer').textContent = Math.max(0, remaining) + 's';
    if (remaining > 0 && remaining <= 5) Sound.play('tick');
    if (remaining === 0) Sound.play('timesUp');
    if (remaining <= 0) clearInterval(timerInterval);
  }, 1000);
}

// SAP word-cloud palette — rich multi-colour like the reference image
const WC_COLORS = [
  '#7858FF', // indigo-6
  '#C35500', // mango-7
  '#1B90FF', // blue-6
  '#FA4F96', // raspberry-6
  '#36A41D', // green-6
  '#049F9A', // teal-6
  '#DF1278', // raspberry-7
  '#002A86', // blue-10
  '#E76500', // mango-6
  '#5D36FF', // indigo-7
];

// Assign a stable color to each unique word string.
const wcColorMap = {};
let wcColorIdx = 0;
function wcColor(word) {
  if (!wcColorMap[word]) wcColorMap[word] = WC_COLORS[wcColorIdx++ % WC_COLORS.length];
  return wcColorMap[word];
}

// Render a proper canvas word cloud using WordCloud2.js.
// Falls back to the flex-wrap span layout when the library is absent.
function renderWordCloud(container, words) {
  container.innerHTML = '';

  if (!words || !words.length) {
    const ph = document.createElement('span');
    ph.className = 'wc-placeholder';
    ph.textContent = 'Waiting for words…';
    container.appendChild(ph);
    return;
  }

  const sorted = words.slice().sort((a, b) => b.count - a.count);
  const max = sorted[0].count;

  // Try WordCloud2.js (canvas) path
  if (typeof WordCloud !== 'undefined') {
    const canvas = document.createElement('canvas');
    const w = container.offsetWidth || 900;
    const h = container.offsetHeight || 400;
    canvas.width  = w * (window.devicePixelRatio || 1);
    canvas.height = h * (window.devicePixelRatio || 1);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    container.appendChild(canvas);

    // Scale font sizes so the biggest word fills ~28% of canvas width
    const baseSize = Math.max(14, Math.round(w * 0.28 / (sorted[0].word.length || 1)));
    const list = sorted.map(({ word, count }) => {
      const ratio = count / max;
      const size = Math.round(baseSize * (0.25 + ratio * 0.75));
      return [word, size];
    });

    WordCloud(canvas, {
      list,
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
      fontWeight: '700',
      color: (word) => wcColor(word),
      rotateRatio: 0.35,
      rotationSteps: 2,  // 0° or 90° only — readable
      backgroundColor: 'white',
      gridSize: Math.round(w / 60),
      minSize: 10,
      drawOutOfBound: false,
      shrinkToFit: true,
    });
    return;
  }

  // Fallback: flex-wrap spans (same as before, no library needed)
  container.classList.add('wc-fallback');
  sorted.forEach(({ word, count }, idx) => {
    const ratio = count / max;
    const level = ratio >= 0.9 ? 5 : ratio >= 0.65 ? 4 : ratio >= 0.4 ? 3 : ratio >= 0.2 ? 2 : 1;
    const el = document.createElement('span');
    el.className = `word s${level}`;
    el.style.color = wcColor(word);
    el.textContent = word;
    container.appendChild(el);
  });
}

function prettyType(t) {
  return { quiz: 'Quiz', truefalse: 'True / False', poll: 'Poll', wordcloud: 'Word Cloud' }[t] || t;
}
function escape(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
